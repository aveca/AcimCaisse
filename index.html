<!DOCTYPE html>
<html>
<head>
  <base href="/AcimCaisse/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="AcimCaisse - caisse hors-ligne pour epicerie">
  
  <!-- product_catalog.js, pdf.min.js, pdf_extract.js REMOVED — conflit panier duplicata -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="AcimCaisse">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>AcimCaisse</title>
  <link rel="manifest" href="manifest.json">
  <!-- Tracker UX pour analyse des parcours utilisateurs -->
  <script src="tracker.js"></script>
  <!-- CSS pour fixer l'UX/UI -->
  <link rel="stylesheet" href="acimcaisse-ux-fix.css">
  <!-- Correction des stocks négatifs -->
  <script src="fix-negative-stock.js"></script>
  <!-- Autocomplétion pour la saisie manuelle -->
  <script src="barcode-autocomplete.js"></script>
</head>
<body>
  <script src="flutter_bootstrap.js?v=30" async></script>
  
  <!-- Bouton Valider (ajouté pour clarifier le workflow) -->
  <button id="acim-validate-btn" data-tooltip="Valider le produit (Entrée)" style="display: none;">✓ Valider</button>
  
  <!--
    INJECTION DANS LE SHADOW DOM DE FLUTTER
    C'est la solution définitive pour que les styles CSS pénètrent dans flutter-view
    -->
  <script>
    // ============================================
    // INJECTION DES STYLES DANS LE SHADOW DOM
    // ============================================
    function injectStylesIntoFlutterShadowDOM() {
      const flutterView = document.querySelector('flutter-view');
      
      if (flutterView && flutterView.shadowRoot) {
        // Vérifier si on a déjà injecté les styles
        if (flutterView.shadowRoot.querySelector('#acim-ux-fix-style')) {
          return;
        }
        
        // Créer un élément style pour le shadow DOM
        const style = document.createElement('style');
        style.id = 'acim-ux-fix-style';
        style.textContent = `
          /* ============================================
             STYLES POUR LE SHADOW DOM DE FLUTTER
             Solution au problème: panier non visible après scan
             ============================================ */
          
          /* Forcer le panier à être visible et fixe en bas */
          #acim-ticket-overlay {
            position: fixed !important;
            bottom: 20px !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            width: 90% !important;
            max-width: 800px !important;
            z-index: 9999 !important;
            background: rgba(255, 255, 255, 0.98) !important;
            border-radius: 12px !important;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3) !important;
            padding: 20px !important;
          }
          
          /* Style des éléments dans le panier */
          #acim-ticket-overlay > div {
            display: block !important;
            width: 100% !important;
            overflow-y: auto !important;
            max-height: 300px !important;
          }
          
          /* Style des produits dans le panier */
          .acim-cart-item,
          .acim-ticket-item {
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            padding: 10px !important;
            border-bottom: 1px solid #eee !important;
            background: white !important;
            margin: 5px 0 !important;
            border-radius: 6px !important;
          }
          
          /* Style du total */
          .acim-cart-total,
          .acim-ticket-total {
            position: sticky !important;
            bottom: 0 !important;
            background: #19725b !important;
            color: white !important;
            padding: 15px !important;
            font-size: 20px !important;
            font-weight: bold !important;
            border-radius: 0 0 12px 12px !important;
            margin-top: 10px !important;
          }
          
          /* Rendre le champ code-barres ultra-visible */
          #acim-bc-input {
            width: 300px !important;
            height: 50px !important;
            font-size: 24px !important;
            padding: 0 15px !important;
            border: 3px solid #e65100 !important;
            border-radius: 8px !important;
            background: white !important;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2) !important;
            animation: pulse-glow 2s infinite alternate !important;
            outline: none !important;
          }
          
          #acim-bc-input:focus {
            border-color: #19725b !important;
            box-shadow: 0 0 0 4px rgba(25, 114, 91, 0.3) !important;
            animation: none !important;
          }
          
          @keyframes pulse-glow {
            from {
              box-shadow: 0 0 0 0 rgba(230, 81, 0, 0.4) !important;
            }
            to {
              box-shadow: 0 0 0 10px rgba(230, 81, 0, 0) !important;
            }
          }
          
          /* Bouton scanner */
          #acim-barcode-btn {
            width: 80px !important;
            height: 80px !important;
            position: absolute !important;
            right: 10px !important;
            top: 50% !important;
            transform: translateY(-50%) !important;
            background: #e65100 !important;
            border: none !important;
            border-radius: 50% !important;
            cursor: pointer !important;
            box-shadow: 0 4px 12px rgba(230, 81, 0, 0.4) !important;
            transition: all 0.3s ease !important;
            font-size: 30px !important;
            color: white !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
          }
          
          #acim-barcode-btn:hover {
            background: #c43e00 !important;
            transform: translateY(-50%) scale(1.1) !important;
            box-shadow: 0 6px 16px rgba(230, 81, 0, 0.6) !important;
          }
          
          /* Désactiver pointer-events sur flutter-view mais pas sur les enfants */
          :host {
            pointer-events: auto !important;
          }
          
          /* Rendre tous les éléments enfants cliquables */
          * {
            pointer-events: auto !important;
          }
        `;
        
        // Injecter dans le shadow DOM
        flutterView.shadowRoot.appendChild(style);
        
        console.log('[AcimCaisse] Styles injectés dans le shadow DOM de Flutter');
      }
    }
    
    // Essayer d'injecter immédiatement
    injectStylesIntoFlutterShadowDOM();
    
    // Réessayer toutes les 200ms pendant 10 secondes (le temps que Flutter charge)
    let retryCount = 0;
    const maxRetries = 50; // 10 secondes
    const retryInterval = setInterval(() => {
      retryCount++;
      injectStylesIntoFlutterShadowDOM();
      
      if (retryCount >= maxRetries) {
        clearInterval(retryInterval);
        console.log('[AcimCaisse] Arrêt des tentatives d\'injection après ' + maxRetries + ' essais');
      }
    }, 200);
    
    // ============================================
    // GESTION DU BOUTON VALIDER
    // ============================================
    function checkAndShowValidateBtn() {
      const bcInput = document.getElementById('acim-bc-input');
      const validateBtn = document.getElementById('acim-validate-btn');
      
      if (bcInput && validateBtn) {
        validateBtn.style.display = 'block';
        
        // Positionner le bouton à côté du champ
        const bcRect = bcInput.getBoundingClientRect();
        validateBtn.style.position = 'absolute';
        validateBtn.style.left = (bcRect.left + bcRect.width + 10) + 'px';
        validateBtn.style.top = (bcRect.top + window.scrollY) + 'px';
        
        // Gérer le clic sur Valider
        validateBtn.onclick = function() {
          const event = new KeyboardEvent('keydown', { key: 'Enter', code: 'Enter' });
          bcInput.dispatchEvent(event);
        };
      }
    }
    
    // Vérifier toutes les 500ms si le champ existe
    setInterval(checkAndShowValidateBtn, 500);
    
    // ============================================
    // TOOLTIPS
    // ============================================
    function addTooltips() {
      const barcodeBtn = document.getElementById('acim-barcode-btn');
      if (barcodeBtn) {
        barcodeBtn.setAttribute('data-tooltip', 'Ouvrir le scanner de code-barres');
      }
    }
    
    // Ajouter les tooltips après le chargement
    window.addEventListener('load', addTooltips);
    setTimeout(addTooltips, 1000);
    setTimeout(addTooltips, 3000);
    
    // ============================================
    // FORCER LE FOCUS SUR LE CHAMP CODE-BARRES
    // Solution au problème: "Autofocus processing was blocked"
    // ============================================
    function forceFocusOnBarcodeInput() {
      const bcInput = document.getElementById('acim-bc-input');
      if (bcInput) {
        // Flouter tous les éléments Flutter d'abord
        const flutterElements = document.querySelectorAll('flutter-view, flutter-view *');
        flutterElements.forEach(el => {
          try { el.blur(); } catch(e) {}
        });
        
        // Puis faire le focus sur le champ
        setTimeout(() => {
          bcInput.focus();
        }, 100);
      }
    }
    
    // Forcer le focus toutes les 2 secondes
    setInterval(forceFocusOnBarcodeInput, 2000);
    
    // ============================================
    // AFFICHER UN MESSAGE SI AUCUN PRODUIT N'EST VISIBLE
    // ============================================
    function checkCartVisibility() {
      const cartItems = document.querySelectorAll('.acim-cart-item, .acim-ticket-item');
      const overlay = document.getElementById('acim-ticket-overlay');
      
      if (cartItems.length === 0 && overlay) {
        // Vérifier si l'overlay est visible
        const overlayStyle = window.getComputedStyle(overlay);
        if (overlayStyle.display === 'none' || overlayStyle.visibility === 'hidden') {
          console.log('[AcimCaisse] PROBLÈME: Le panier est masqué!');
          // Forcer l'affichage
          overlay.style.display = 'block' !important;
          overlay.style.visibility = 'visible' !important;
        }
      }
    }
    
    setInterval(checkCartVisibility, 1000);
    
    // ============================================
    // INITIALISATION DES NOUVEAUX MODULES
    // ============================================
    
    // Initialiser la correction des stocks négatifs
    setTimeout(() => {
      if (window.AcimCaisseStockFix) {
        window.AcimCaisseStockFix.fix();
      }
    }, 3000);
    
    // Initialiser l'autocomplétion (démarre automatiquement)
    // Le script barcode-autocomplete.js s'initialise lui-même
    
    // ============================================
    // FEEDBACK VISUEL POUR LA SAISIE
    // ============================================
    function addInputFeedback() {
      const bcInput = document.getElementById('acim-bc-input');
      if (!bcInput) {
        setTimeout(addInputFeedback, 500);
        return;
      }
      
      // Ajouter un indicateur de chargement/recherche
      const feedbackDiv = document.createElement('div');
      feedbackDiv.id = 'acim-input-feedback';
      feedbackDiv.style.cssText = `
        position: absolute;
        left: 0;
        top: -30px;
        font-size: 12px;
        color: #666;
        height: 20px;
        display: none;
      `;
      bcInput.parentNode.insertBefore(feedbackDiv, bcInput);
      
      // Mettre à jour le feedback lors de la saisie
      bcInput.addEventListener('input', (e) => {
        const value = e.target.value;
        if (value.length >= 2) {
          feedbackDiv.textContent = '🔍 Recherche en cours...';
          feedbackDiv.style.display = 'block';
        } else {
          feedbackDiv.style.display = 'none';
        }
      });
      
      // Masquer le feedback après 1 seconde
      bcInput.addEventListener('blur', () => {
        setTimeout(() => {
          feedbackDiv.style.display = 'none';
        }, 1000);
      });
    }
    
    setTimeout(addInputFeedback, 1000);
  </script>
</body>
</html>
